<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>한국인공지능교육센터</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0a1628;
      --deep: #0d1f3c;
      --gold: #c9922a;
      --gold-light: #f0c060;
      --white: #f4f1eb;
      --muted: #8a9bb5;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--navy);
      color: var(--white);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* 배경 원형 그라디언트 */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 900px;
      background: radial-gradient(circle, rgba(201,146,42,0.08) 0%, transparent 70%);
      pointer-events: none;
      animation: pulse 6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translateX(-50%) scale(1); opacity: 1; }
      50% { transform: translateX(-50%) scale(1.08); opacity: 0.7; }
    }

    /* 격자 배경 */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,146,42,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,146,42,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
      max-width: 800px;
      width: 100%;
    }

    /* 날짜 뱃지 */
    .badge {
      display: inline-block;
      border: 1px solid var(--gold);
      color: var(--gold-light);
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      padding: 0.4rem 1.4rem;
      border-radius: 2px;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.3s;
    }

    /* 메인 타이틀 */
    .main-title {
      font-family: 'Noto Serif KR', serif;
      font-weight: 900;
      font-size: clamp(2rem, 6vw, 3.8rem);
      line-height: 1.3;
      color: var(--white);
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.6s;
    }

    .main-title .highlight {
      color: var(--gold-light);
      position: relative;
      display: inline-block;
    }

    .main-title .highlight::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--gold);
      animation: lineGrow 1s ease forwards 1.5s;
    }

    @keyframes lineGrow {
      to { width: 100%; }
    }

    /* 구분선 */
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 2rem auto;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.9s;
    }

    /* 일러스트 영역 */
    .illustration {
      margin: 1.5rem auto;
      width: 260px;
      height: 200px;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1s;
    }

    .illustration svg {
      width: 100%;
      height: 100%;
    }

    /* 공사중 안내 */
    .under-construction {
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-top: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.2s;
    }

    /* 파티클 효과 */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--gold);
      border-radius: 50%;
      animation: float linear infinite;
      opacity: 0;
    }

    @keyframes float {
      0% { transform: translateY(100vh) translateX(0); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-10vh) translateX(40px); opacity: 0; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 반응형 */
    @media (max-width: 480px) {
      .main-title { font-size: 1.7rem; }
      .illustration { width: 200px; height: 160px; }
    }
  </style>
</head>
<body>

  <!-- 파티클 -->
  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="badge">2026년 5월 출범 예정</div>

    <h1 class="main-title">
      <span class="highlight">한국인공지능교육센터</span>가<br>출범합니다!
    </h1>

    <div class="divider"></div>

    <!-- AI 로봇 포크레인 공사중 SVG 일러스트 -->
    <div class="illustration">
      <svg viewBox="0 0 260 200" xmlns="http://www.w3.org/2000/svg">
        <!-- 하늘 배경 -->
        <rect width="260" height="200" fill="none"/>

        <!-- 땅 -->
        <ellipse cx="130" cy="185" rx="120" ry="18" fill="#1a2e1a" opacity="0.7"/>
        <rect x="10" y="175" width="240" height="25" rx="4" fill="#1a2e1a" opacity="0.5"/>

        <!-- 굴착 구덩이 -->
        <ellipse cx="100" cy="177" rx="55" ry="10" fill="#0a1a0a" opacity="0.9"/>

        <!-- 흙더미들 -->
        <ellipse cx="170" cy="172" rx="20" ry="8" fill="#5a3a1a" opacity="0.8"/>
        <ellipse cx="185" cy="168" rx="14" ry="6" fill="#6b4a2a" opacity="0.8"/>
        <ellipse cx="158" cy="170" rx="10" ry="5" fill="#5a3a1a" opacity="0.7"/>

        <!-- 포크레인 차체 -->
        <rect x="55" y="140" width="70" height="35" rx="5" fill="#c9922a"/>
        <rect x="60" y="130" width="55" height="20" rx="3" fill="#b08020"/>

        <!-- 포크레인 캐빈 -->
        <rect x="65" y="108" width="38" height="28" rx="4" fill="#d4a030"/>
        <!-- 캐빈 유리 -->
        <rect x="69" y="112" width="30" height="18" rx="2" fill="#0a2040" opacity="0.8"/>
        <!-- 유리 반사 -->
        <line x1="71" y1="113" x2="77" y2="128" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

        <!-- 포크레인 붐(팔) - 길게 뻗은 형태 -->
        <!-- 메인 붐 -->
        <rect x="100" y="95" width="70" height="10" rx="3" fill="#b08020" transform="rotate(-20 100 100)"/>
        <!-- 스틱(두 번째 팔) -->
        <rect x="148" y="72" width="55" height="8" rx="3" fill="#c9922a" transform="rotate(15 148 76)"/>
        <!-- 버킷(버켓) -->
        <path d="M190 90 L205 88 L208 100 L195 105 L185 100 Z" fill="#8b6010" stroke="#c9922a" stroke-width="1"/>
        <!-- 버킷 날 -->
        <path d="M190 100 L195 105 L200 103 L208 100" fill="none" stroke="#f0c060" stroke-width="1.5"/>

        <!-- 포크레인 바퀴/트랙 -->
        <rect x="52" y="165" width="76" height="14" rx="7" fill="#333"/>
        <circle cx="65" cy="172" r="8" fill="#444"/>
        <circle cx="65" cy="172" r="4" fill="#222"/>
        <circle cx="90" cy="172" r="8" fill="#444"/>
        <circle cx="90" cy="172" r="4" fill="#222"/>
        <circle cx="115" cy="172" r="8" fill="#444"/>
        <circle cx="115" cy="172" r="4" fill="#222"/>
        <!-- 트랙 링크 -->
        <rect x="55" y="167" width="70" height="3" rx="1" fill="#555" opacity="0.6"/>
        <rect x="55" y="174" width="70" height="3" rx="1" fill="#555" opacity="0.6"/>

        <!-- AI 로봇 머리 (운전석 위에) -->
        <!-- 로봇 목 -->
        <rect x="78" y="100" width="12" height="10" rx="2" fill="#607080"/>
        <!-- 로봇 머리 -->
        <rect x="70" y="78" width="28" height="24" rx="5" fill="#708090"/>
        <!-- 로봇 눈 - 빛나는 효과 -->
        <circle cx="79" cy="88" r="5" fill="#0a1628"/>
        <circle cx="79" cy="88" r="3" fill="#00ccff" opacity="0.9"/>
        <circle cx="79" cy="88" r="1.5" fill="white"/>
        <circle cx="93" cy="88" r="5" fill="#0a1628"/>
        <circle cx="93" cy="88" r="3" fill="#00ccff" opacity="0.9"/>
        <circle cx="93" cy="88" r="1.5" fill="white"/>
        <!-- 로봇 입 -->
        <rect x="75" y="97" width="18" height="3" rx="1.5" fill="#0a1628"/>
        <rect x="77" y="97" width="4" height="3" rx="1" fill="#00ff88" opacity="0.8"/>
        <rect x="83" y="97" width="4" height="3" rx="1" fill="#00ff88" opacity="0.5"/>
        <!-- 로봇 안테나 -->
        <line x1="84" y1="78" x2="84" y2="68" stroke="#90a0b0" stroke-width="2"/>
        <circle cx="84" cy="66" r="3" fill="#f0c060"/>
        <circle cx="84" cy="66" r="1.5" fill="white" opacity="0.8"/>

        <!-- 흙 먼지 파티클 -->
        <circle cx="140" cy="155" r="3" fill="#8b6010" opacity="0.7"/>
        <circle cx="148" cy="148" r="2" fill="#8b6010" opacity="0.5"/>
        <circle cx="135" cy="145" r="2.5" fill="#a07020" opacity="0.6"/>
        <circle cx="155" cy="152" r="2" fill="#7a5010" opacity="0.5"/>
        <circle cx="128" cy="158" r="1.5" fill="#8b6010" opacity="0.4"/>

        <!-- 공사 안내판 -->
        <rect x="195" y="140" width="50" height="32" rx="2" fill="#f0c060"/>
        <rect x="197" y="142" width="46" height="28" rx="2" fill="#0a1628"/>
        <text x="220" y="153" text-anchor="middle" font-size="5.5" fill="#f0c060" font-family="sans-serif" font-weight="bold">공사중</text>
        <text x="220" y="163" text-anchor="middle" font-size="4.5" fill="#8a9bb5" font-family="sans-serif">KAIEC</text>
        <!-- 안내판 기둥 -->
        <rect x="217" y="172" width="6" height="8" fill="#8b6010"/>
      </svg>
    </div>

    <p class="under-construction">🚧 &nbsp; 홈페이지 준비 중 &nbsp; 🚧</p>
  </div>

  <script>
    // 파티클 생성
    const container = document.getElementById('particles');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        width: ${Math.random() * 3 + 1}px;
        height: ${Math.random() * 3 + 1}px;
        animation-duration: ${Math.random() * 12 + 8}s;
        animation-delay: ${Math.random() * 8}s;
        opacity: 0;
      `;
      container.appendChild(p);
    }
  </script>
</body>
</html>
